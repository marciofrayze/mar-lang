<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belm Docs</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

      :root {
        --bg: #f4f8ff;
        --surface: #ffffff;
        --border: #d1deef;
        --text: #1a293b;
        --muted: #5f728a;
        --blue: #2d7ed2;
        --code-bg: #12263d;
        --code-border: #264669;
        --code-text: #d8e9ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
      }

      .shell {
        max-width: 1040px;
        margin: 20px auto 28px;
        padding: 0 20px;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
      }

      .brand {
        font-size: 28px;
        font-weight: 700;
        color: #163960;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
      }

      .nav a {
        color: #405876;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        padding-top: 6px;
        margin-left: 14px;
      }

      .nav a:hover {
        color: #405876;
        text-decoration: none;
      }

      .nav-current {
        color: #245287;
        font-weight: 700;
        font-size: 14px;
        padding-top: 6px;
        margin-left: 14px;
      }
      .content {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }

      .warning {
        background: #fff7e0;
        border: 1px solid #f4d285;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
      }

      .warning-title {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 700;
        color: #794200;
      }

      .warning-text {
        margin: 0;
        line-height: 1.55;
        color: #6b3e00;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: #143559;
        margin: 0.2em 0 0.45em;
        line-height: 1.3;
      }

      h1 { font-size: 34px; }
      h2 { font-size: 28px; margin-top: 1.25em; }
      h3 { font-size: 22px; margin-top: 1.1em; }

      p {
        margin: 0.4em 0 0.9em;
        line-height: 1.6;
        color: #2e435b;
      }

      ul,
      ol {
        margin: 0.3em 0 1em 1.35em;
        color: #2e435b;
        line-height: 1.6;
      }

      li { margin: 0.2em 0; }

      .step-cards {
        list-style: none;
        margin: 0.45em 0 1.15em;
        padding: 0;
        counter-reset: step;
      }

      .step-cards > li {
        counter-increment: step;
        position: relative;
        margin: 0 0 10px;
        background: #f5faff;
        border: 1px solid #d5e1f2;
        border-radius: 10px;
        padding: 12px 14px 12px 54px;
      }

      .step-cards > li:last-child {
        margin-bottom: 0;
      }

      .step-cards > li::before {
        content: counter(step);
        position: absolute;
        left: 12px;
        top: 12px;
        min-width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #e0ecfc;
        color: #224c7a;
        font-weight: 700;
        font-size: 14px;
        line-height: 24px;
        text-align: center;
      }

      .step-cards > li > ul,
      .step-cards > li > ol {
        margin: 6px 0 0 1.2em;
      }

      a {
        color: var(--blue);
        text-underline-offset: 2px;
      }

      a:hover {
        color: #1f66b0;
        text-decoration: underline;
      }

      pre {
        margin: 0.7em 0 1.1em;
        background: var(--code-bg);
        border: 1px solid var(--code-border);
        border-radius: 10px;
        padding: 12px 14px;
        overflow: auto;
      }

      code {
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }

      pre code {
        color: var(--code-text);
        white-space: pre;
      }

      pre code.lang-belm .tok-keyword { color: #7ab8ff; }
      pre code.lang-belm .tok-type { color: #4fd1c5; }
      pre code.lang-belm .tok-modifier { color: #b7c5d9; }
      pre code.lang-belm .tok-field { color: #dce8f8; }
      pre code.lang-belm .tok-entity { color: #92c4ff; }
      pre code.lang-belm .tok-crud { color: #93d7ff; }
      pre code.lang-belm .tok-string { color: #f7c97f; }
      pre code.lang-belm .tok-number { color: #f5a97f; }
      pre code.lang-belm .tok-function { color: #82e0aa; }
      pre code.lang-belm .tok-context { color: #c3d7ff; }
      pre code.lang-belm .tok-operator { color: #d8e9ff; }
      pre code.lang-belm .tok-punctuation { color: #afc7e6; }
      pre code.lang-belm .tok-comment { color: #7f96b3; font-style: italic; }

      :not(pre) > code {
        background: #edf3fc;
        color: #264669;
        border: 1px solid #d4e3f7;
        border-radius: 6px;
        padding: 0.08em 0.35em;
      }

      .muted {
        color: var(--muted);
        font-size: 14px;
      }

      .error {
        color: #b03737;
        background: #fff3f3;
        border: 1px solid #f3cccc;
        padding: 12px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="top">
        <div class="brand">Belm</div>
        <div class="nav">
          <a id="nav-home" href="../index.html">Home</a>
          <a id="nav-getting-started" href="viewer.html?doc=getting-started">Getting Started</a>
          <a id="nav-advanced" href="viewer.html?doc=advanced">Advanced</a>
          <a id="nav-examples" href="../examples/index.html">Examples</a>
        </div>
      </div>

      <div class="warning">
        <p class="warning-title">Warning</p>
        <p class="warning-text">Belm is still at a very early stage and is <strong>not recommended for production use yet</strong>.</p>
        <p class="warning-text">There are no guarantees that language syntax or database schema will remain backward compatible in future versions.</p>
      </div>

      <div class="content">
        <div id="doc">Loading...</div>
      </div>
    </div>

    <script>
      const docs = {
        'getting-started': 'getting-started.md',
        advanced: 'advanced.md'
      };

      const params = new URLSearchParams(window.location.search);
      const requested = params.get('doc') || 'getting-started';
      const docFile = docs[requested] || docs['getting-started'];

      function setActiveNav() {
        const activeId = requested === 'advanced' ? 'nav-advanced' : 'nav-getting-started';
        const active = document.getElementById(activeId);
        if (active) {
          const label = active.textContent || '';
          const current = document.createElement('span');
          current.className = 'nav-current';
          current.textContent = label;
          active.replaceWith(current);
        }
      }

      setActiveNav();

      function escapeHtml(value) {
        return value
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function normalizeLink(href) {
        const trimmed = href.trim();
        if (/^https?:\/\//i.test(trimmed)) return trimmed;
        if (trimmed.endsWith('getting-started.md')) return 'viewer.html?doc=getting-started';
        if (trimmed.endsWith('advanced.md')) return 'viewer.html?doc=advanced';
        return trimmed;
      }

      const belmKeywords = new Set([
        'app', 'port', 'database', 'entity', 'rule', 'when', 'authorize', 'auth',
        'type', 'alias', 'action', 'input', 'public', 'system', 'dir', 'mount',
        'spa_fallback', 'transaction'
      ]);
      const belmCrudWords = new Set(['list', 'get', 'create', 'update', 'delete']);
      const belmTypes = new Set(['Int', 'String', 'Bool', 'Float']);
      const belmModifiers = new Set(['primary', 'auto', 'optional']);
      const belmFunctions = new Set(['len', 'contains', 'startsWith', 'endsWith', 'matches', 'isRole']);
      const belmContext = new Set([
        'input', 'auth_authenticated', 'auth_email', 'auth_user_id', 'auth_role',
        'true', 'false', 'null'
      ]);
      const belmTwoCharOps = new Set(['>=', '<=', '==', '!=', '&&', '||', '->']);
      const belmOpChars = new Set(['=', '+', '-', '*', '/', '%', '!', '<', '>', '&', '|']);
      const belmPunctuation = new Set(['{', '}', '(', ')', '[', ']', ':', ',', '.']);

      function belmClassForIdentifier(word) {
        if (belmCrudWords.has(word)) return 'tok-crud';
        if (belmKeywords.has(word)) return 'tok-keyword';
        if (belmTypes.has(word)) return 'tok-type';
        if (belmModifiers.has(word)) return 'tok-modifier';
        if (belmFunctions.has(word)) return 'tok-function';
        if (belmContext.has(word)) return 'tok-context';
        if (/^[A-Z]/.test(word)) return 'tok-entity';
        return 'tok-field';
      }

      function wrapBelmToken(cssClass, raw) {
        return `<span class="${cssClass}">${escapeHtml(raw)}</span>`;
      }

      function highlightBelmCode(source) {
        let out = '';
        let i = 0;

        while (i < source.length) {
          const ch = source[i];

          if (ch === '-' && source[i + 1] === '-') {
            let j = i + 2;
            while (j < source.length && source[j] !== '\n') j += 1;
            out += wrapBelmToken('tok-comment', source.slice(i, j));
            i = j;
            continue;
          }

          if (ch === '#') {
            let j = i + 1;
            while (j < source.length && source[j] !== '\n') j += 1;
            out += wrapBelmToken('tok-comment', source.slice(i, j));
            i = j;
            continue;
          }

          if (ch === '"') {
            let j = i + 1;
            while (j < source.length) {
              if (source[j] === '\\' && j + 1 < source.length) {
                j += 2;
                continue;
              }
              if (source[j] === '"') {
                j += 1;
                break;
              }
              j += 1;
            }
            out += wrapBelmToken('tok-string', source.slice(i, j));
            i = j;
            continue;
          }

          if (/[0-9]/.test(ch)) {
            let j = i + 1;
            while (j < source.length && /[0-9]/.test(source[j])) j += 1;
            if (source[j] === '.' && /[0-9]/.test(source[j + 1] || '')) {
              j += 1;
              while (j < source.length && /[0-9]/.test(source[j])) j += 1;
            }
            out += wrapBelmToken('tok-number', source.slice(i, j));
            i = j;
            continue;
          }

          if (/[A-Za-z_]/.test(ch)) {
            let j = i + 1;
            while (j < source.length && /[A-Za-z0-9_]/.test(source[j])) j += 1;
            const word = source.slice(i, j);
            out += wrapBelmToken(belmClassForIdentifier(word), word);
            i = j;
            continue;
          }

          const two = source.slice(i, i + 2);
          if (belmTwoCharOps.has(two)) {
            out += wrapBelmToken('tok-operator', two);
            i += 2;
            continue;
          }

          if (belmOpChars.has(ch)) {
            out += wrapBelmToken('tok-operator', ch);
            i += 1;
            continue;
          }

          if (belmPunctuation.has(ch)) {
            out += wrapBelmToken('tok-punctuation', ch);
            i += 1;
            continue;
          }

          out += escapeHtml(ch);
          i += 1;
        }

        return out;
      }

      function renderCodeBlock(source, language) {
        const lang = (language || '').toLowerCase();
        if (lang === 'belm') {
          return `<pre><code class="lang-belm">${highlightBelmCode(source)}</code></pre>`;
        }
        return `<pre><code>${escapeHtml(source)}</code></pre>`;
      }

      function inlineMarkdown(text) {
        const codeHolders = [];
        let out = escapeHtml(text);

        out = out.replace(/`([^`]+)`/g, (_, code) => {
          const token = `@@CODE_${codeHolders.length}@@`;
          codeHolders.push(`<code>${code}</code>`);
          return token;
        });

        out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
          const safeHref = normalizeLink(href);
          const external = /^https?:\/\//i.test(safeHref);
          const target = external ? ' target="_blank" rel="noopener noreferrer"' : '';
          return `<a href="${safeHref}"${target}>${label}</a>`;
        });

        out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');

        out = out.replace(/@@CODE_(\d+)@@/g, (_, i) => codeHolders[Number(i)] || '');
        return out;
      }

      function renderMarkdown(markdown) {
        const lines = markdown.replace(/\r\n?/g, '\n').split('\n');
        const html = [];
        let i = 0;

        function renderListBlockFromLines(blockLines, ordered) {
          const bulletRegex = ordered
            ? /^(\s*)\d+\.\s+(.*)$/
            : /^(\s*)[-*]\s+(.*)$/;
          const listTag = ordered ? 'ol' : 'ul';
          const entries = [];

          for (const rawLine of blockLines) {
            const match = rawLine.match(bulletRegex);
            if (!match) continue;
            const indent = match[1].replace(/\t/g, '    ').length;
            entries.push({ indent, content: match[2] });
          }

          if (entries.length === 0) return '';

          let cursor = 0;

          function renderLevel(levelIndent) {
            let out = `<${listTag}>`;

            while (cursor < entries.length) {
              const entry = entries[cursor];

              if (entry.indent < levelIndent) break;

              if (entry.indent > levelIndent) {
                out += renderLevel(entry.indent);
                continue;
              }

              out += `<li>${inlineMarkdown(entry.content)}`;
              cursor += 1;

              if (cursor < entries.length && entries[cursor].indent > levelIndent) {
                out += renderLevel(entries[cursor].indent);
              }

              out += '</li>';
            }

            out += `</${listTag}>`;
            return out;
          }

          return renderLevel(entries[0].indent);
        }

        while (i < lines.length) {
          const line = lines[i];

          if (/^```/.test(line)) {
            const fence = line.match(/^```([A-Za-z0-9_-]+)?/);
            const language = fence && fence[1] ? fence[1] : '';
            const codeLines = [];
            i += 1;
            while (i < lines.length && !/^```/.test(lines[i])) {
              codeLines.push(lines[i]);
              i += 1;
            }
            html.push(renderCodeBlock(codeLines.join('\n'), language));
            i += 1;
            continue;
          }

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
            i += 1;
            continue;
          }

          if (/^\s*[-*]\s+/.test(line)) {
            const block = [];
            while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
              block.push(lines[i]);
              i += 1;
            }
            html.push(renderListBlockFromLines(block, false));
            continue;
          }

          if (/^\s*\d+\.\s+/.test(line)) {
            const block = [];
            while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
              block.push(lines[i]);
              i += 1;
            }
            html.push(renderListBlockFromLines(block, true));
            continue;
          }

          if (/^\s*$/.test(line)) {
            i += 1;
            continue;
          }

          const para = [line];
          i += 1;
          while (
            i < lines.length &&
            !/^\s*$/.test(lines[i]) &&
            !/^(#{1,6})\s+/.test(lines[i]) &&
            !/^```/.test(lines[i]) &&
            !/^\s*[-*]\s+/.test(lines[i]) &&
            !/^\s*\d+\.\s+/.test(lines[i])
          ) {
            para.push(lines[i]);
            i += 1;
          }
          html.push(`<p>${inlineMarkdown(para.join(' '))}</p>`);
        }

        return html.join('\n');
      }

      function decorateGettingStartedSections() {
        if (requested !== 'getting-started') return;
        const root = document.getElementById('doc');
        if (!root) return;

        const targetTitles = new Set(['Install', 'Quick Start']);
        const headings = root.querySelectorAll('h2');

        for (const heading of headings) {
          const title = (heading.textContent || '').trim();
          if (!targetTitles.has(title)) continue;

          let cursor = heading.nextElementSibling;
          while (cursor && cursor.tagName !== 'H2') {
            if (cursor.tagName === 'OL') {
              cursor.classList.add('step-cards');
              break;
            }
            cursor = cursor.nextElementSibling;
          }
        }
      }

      fetch(docFile)
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then((markdown) => {
          document.getElementById('doc').innerHTML = renderMarkdown(markdown);
          decorateGettingStartedSections();
        })
        .catch((err) => {
          document.getElementById('doc').innerHTML = `<div class="error">Could not load document: ${escapeHtml(String(err))}</div>`;
        });
    </script>
  </body>
</html>
