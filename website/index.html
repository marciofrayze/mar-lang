<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mar Language</title>
    <link rel="icon" type="image/svg+xml" href="mar-symbol.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        background: #f4f8ff;
      }

      .copy-link {
        outline: none;
        border-radius: 6px;
      }

      .copy-link:focus {
        outline: none;
      }

      .copy-link:focus-visible {
        outline: none;
        box-shadow: none;
        background: transparent;
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="dist/app.js"></script>
    <script>
      const app = Elm.Main.init({ node: document.getElementById('app') });

      const scheduleScrollToTop = () => {
        const run = () => window.scrollTo({ top: 0, left: 0, behavior: 'auto' });

        run();
        window.requestAnimationFrame(run);
        window.setTimeout(run, 0);
      };

      const scheduleScrollToElement = (id) => {
        const run = () => {
          const element = document.getElementById(id);

          if (!element) return;

          const top = element.getBoundingClientRect().top + window.scrollY - 88;
          window.scrollTo({ top, left: 0, behavior: 'auto' });
        };

        run();
        window.requestAnimationFrame(run);
        window.setTimeout(run, 0);
      };

      if (app.ports && app.ports.copyToClipboard) {
        app.ports.copyToClipboard.subscribe((value) => {
          if (typeof value === 'string' && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(value).catch(() => {});
          }
        });
      }

      if (app.ports && app.ports.scrollToTop) {
        app.ports.scrollToTop.subscribe(() => {
          scheduleScrollToTop();
        });
      }

      if (app.ports && app.ports.scrollToElement) {
        app.ports.scrollToElement.subscribe((id) => {
          if (typeof id === 'string' && id.length > 0) {
            scheduleScrollToElement(id);
          }
        });
      }
    </script>
  </body>
</html>
