<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belm Language</title>
    <link rel="icon" type="image/svg+xml" href="mar-symbol.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        background: #f4f8ff;
      }

      .copy-link {
        outline: none;
        border-radius: 6px;
      }

      .copy-link:focus {
        outline: none;
      }

      .copy-link:focus-visible {
        outline: none;
        box-shadow: none;
        background: transparent;
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="dist/app.js"></script>
    <script>
      const app = Elm.Main.init({ node: document.getElementById('app') });

      if (app.ports && app.ports.copyToClipboard) {
        app.ports.copyToClipboard.subscribe((value) => {
          if (typeof value === 'string' && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(value).catch(() => {});
          }
        });
      }
    </script>
  </body>
</html>
