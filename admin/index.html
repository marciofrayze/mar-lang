<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/_belm/admin/favicon.svg" />
    <title>Belm Admin</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top left, #f3f7ff, #eef2f8 50%, #e8eef5 100%);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/_belm/admin/dist/app.js"></script>
    <script>
      const sessionStorageKey = 'belm.admin.session';

      function normalizeToken(value) {
        return typeof value === 'string' ? value.trim() : '';
      }

      function readSession() {
        try {
          const raw = window.localStorage.getItem(sessionStorageKey);
          if (!raw) {
            return { authToken: '', systemAuthToken: '' };
          }
          const parsed = JSON.parse(raw);
          return {
            authToken: normalizeToken(parsed.authToken),
            systemAuthToken: normalizeToken(parsed.systemAuthToken)
          };
        } catch (_) {
          return { authToken: '', systemAuthToken: '' };
        }
      }

      function writeSession(session) {
        const authToken = normalizeToken(session && session.authToken);
        const systemAuthToken = normalizeToken(session && session.systemAuthToken);
        if (!authToken && !systemAuthToken) {
          window.localStorage.removeItem(sessionStorageKey);
          return;
        }
        window.localStorage.setItem(
          sessionStorageKey,
          JSON.stringify({ authToken, systemAuthToken })
        );
      }

      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get('api') || window.location.origin;
      const session = readSession();

      const app = Elm.Main.init({
        node: document.getElementById('app'),
        flags: {
          apiBase,
          authToken: session.authToken,
          systemAuthToken: session.systemAuthToken
        }
      });

      if (app.ports && app.ports.saveSession) {
        app.ports.saveSession.subscribe(writeSession);
      }
    </script>
  </body>
</html>
